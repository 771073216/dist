name: sync
on:
  schedule:
    - cron: "0 0 * * *"
  watch:
      types: started
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout out project files
        uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Check and release
        run: |
          push=0
          xray_latest=$(wget -qO- "https://api.github.com/repos/XTLS/Xray-core/releases/latest" | awk -F '"' '/tag_name/ {print $4}' | tr -d 'v')
          v2rayn_latest=$(wget -qO- "https://api.github.com/repos/2dust/v2rayN/releases/latest" | awk -F '"' '/tag_name/ {print $4}')
          v2rayng_latest=$(wget -qO- "https://api.github.com/repos/2dust/v2rayNG/tags" | awk -F '"' '/name/ {print $4}' | head -n 1)
          caddy_latest=$(wget -qO- "https://api.github.com/repos/caddyserver/caddy/releases/latest" | awk -F '"' '/tag_name/ {print $4}' | tr -d 'v')
          anxray_latest=$(wget -qO- "https://api.github.com/repos/XTLS/AnXray/releases/latest" | awk -F '"' '/tag_name/ {print $4}')
          xray_local=$(awk '/xray/ {print$2}' version)
          v2rayn_local=$(awk '/\<v2rayn\>/ {print$2}' version)
          v2rayng_local=$(awk '/v2rayng/ {print$2}' version)
          caddy_local=$(awk '/caddy/ {print$2}' version)
          anxray_local=$(awk '/anxray/ {print$2}' version)
          if ! [ "${anxray_latest}" == "${anxray_local}" ]; then
          rm AX-"$anxray_local"-arm64-v8a.apk
          wget -q --show-progress https://github.com/XTLS/AnXray/releases/latest/download/AX-"$anxray_latest"-arm64-v8a.apk -O anxray-"$anxray_latest".apk
          sed -i "s/anxray: $anxray_local/anxray: $anxray_latest/g" version
          sed -i "s/anxray-$v2rayn_local.apk/anxray-$v2rayn_latest.apk/g" README.md
          anxraycommit="anxray: ${anxray_local} -> ${anxray_latest} "
          push=1
          fi
          if ! [ "${v2rayn_latest}" == "${v2rayn_local}" ]; then
          rm -f v2rayn-v"$v2rayn_local".zip v2rayn-core-v"$v2rayn_local".zip
          wget -q --show-progress https://github.com/2dust/v2rayN/releases/latest/download/v2rayN.zip -O v2rayn-v"$v2rayn_latest".zip
          wget -q --show-progress https://github.com/2dust/v2rayN/releases/latest/download/v2rayN-Core.zip -O v2rayn-core-v"$v2rayn_latest".zip
          sed -i "s/v2rayn: $v2rayn_local/v2rayn: $v2rayn_latest/g" version
          sed -i "s/v2rayn-v$v2rayn_local.zip/v2rayn-v$v2rayn_latest.zip/g" README.md
          sed -i "s/v2rayn-core-v$v2rayn_local.zip/v2rayn-core-v$v2rayn_latest.zip/g" README.md
          v2rayncommit="caddy: v${v2rayn_local} -> v${v2rayn_latest} "
          push=1
          fi
          if ! [ "${v2rayng_latest}" == "${v2rayng_local}" ]; then
          rm -f v2rayng-v"$v2rayng_local".apk
          wget -q --show-progress https://github.com/2dust/v2rayNG/releases/download/"$v2rayng_latest"/v2rayNG_"$v2rayng_latest"_arm64-v8a.apk -O v2rayng-v"$v2rayng_latest".apk
          sed -i "s/v2rayng: $v2rayng_local/v2rayng: $v2rayng_latest/g" version
          sed -i "s/v2rayng-v$v2rayng_local.apk/v2rayng-v$v2rayng_latest.apk/g" README.md
          v2rayngcommit="xray: v${v2rayng_local} -> v${v2rayng_latest} "
          push=1
          fi
          if ! [ "${caddy_latest}" == "${caddy_local}" ]; then
          wget -q --show-progress https://github.com/caddyserver/caddy/releases/latest/download/caddy_"$caddy_latest"_linux_amd64.deb -O caddy.deb
          sed -i "s/caddy: $caddy_local/caddy: $caddy_latest/g" version
          caddycommit="caddy: v${caddy_local} -> v${caddy_latest}"
          push=1
          fi
          
          if [ "$push" -eq 1 ]; then
          git add .
          git config user.name "771073216"
          git config user.email "771073216@qq.com"
          git commit -m "${caddycommit}${xraycommit}${v2rayncommit}${v2rayngcommit}${anxraycommit}" -a
          git push
          fi
